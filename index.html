<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>marco</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
</head>
<body>
  <div class="stage">
    <nav class="cluster">
      <div class="node" data-label="about" style="--c:#0084be"><div class="shape square"></div></div>
      <div class="node" data-label="projects" style="--c:#0084be"><div class="shape square"></div></div>
      <div class="node" data-label="blog" style="--c:#0084be"><div class="shape square"></div></div>
    </nav>

    <div class="label-layer"></div>

    <div class="home">
      <div class="wordmark" aria-label="marco"></div>
    </div>

    <div id="content"></div>

    <div id="adv-chev">
      <button class="adv-btn" aria-label="Next section">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <div id="lightbox">
    <button class="lb-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="lb-media"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
